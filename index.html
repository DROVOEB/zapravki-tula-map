<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Заправки Тула</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: #08080a;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            color: #fff;
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            background: radial-gradient(ellipse at 50% 0%, #141416, #08080a 70%);
        }

        /* --- ШАПКА --- */
        #header {
            background: linear-gradient(135deg, #FF8C00, #FF6A00);
            padding: 10px 14px;
            flex-shrink: 0;
            z-index: 10;
            box-shadow: 0 2px 20px rgba(255, 140, 0, 0.2);
        }

        #header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
        }

        #header h1 {
            font-size: 16px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 4px;
            color: #fff;
            text-shadow: 0 1px 10px rgba(0, 0, 0, 0.15);
            white-space: nowrap;
        }

        #header h1 span {
            font-size: 18px;
        }

        #greeting {
            font-size: 10px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
            margin-left: 2px;
            white-space: nowrap;
        }

        #refresh-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 5px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            flex-shrink: 0;
            white-space: nowrap;
        }

        #refresh-btn:active {
            transform: scale(0.95);
        }

        /* --- КАРТА --- */
        #map-container {
            flex: 1;
            position: relative;
            margin: 4px 6px 4px 6px;
            border-radius: 16px;
            overflow: hidden;
            background: #0a0a0c;
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.6);
            min-height: 0;
        }

        #map-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            filter: saturate(1.1) contrast(1.02);
        }

        /* --- ЗАГРУЗКА --- */
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 5;
            pointer-events: none;
        }

        #loading .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255, 140, 0, 0.08);
            border-top: 3px solid #FF8C00;
            border-radius: 50%;
            animation: spin 0.9s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
            margin: 0 auto 6px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #loading p {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.15);
        }

        /* --- НИЖНЯЯ ПАНЕЛЬ (ПОВЫШЕ) --- */
        #footer {
            background: rgba(12, 12, 16, 0.95);
            backdrop-filter: blur(20px);
            padding: 8px 12px;
            flex-shrink: 0;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 4px 6px;
            min-height: 44px;
            font-size: 11px;
            color: #666;
            font-weight: 500;
            width: 100%;
        }

        #footer-left {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 4px 8px;
            flex: 1 1 auto;
        }

        #footer-right {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }

        #footer .date {
            font-weight: 700;
            color: rgba(255, 255, 255, 0.7);
            font-size: 10px;
            display: flex;
            align-items: center;
            gap: 2px;
            white-space: nowrap;
        }

        .status-indicator,
        #views-counter,
        #rating-container {
            display: flex;
            align-items: center;
            gap: 3px;
            padding: 3px 8px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            background: rgba(255, 255, 255, 0.02);
            white-space: nowrap;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #00E676;
            box-shadow: 0 0 10px rgba(0, 230, 118, 0.3);
            animation: pulse-green 2s ease-in-out infinite;
            flex-shrink: 0;
        }

        @keyframes pulse-green {
            0% { box-shadow: 0 0 2px rgba(0, 230, 118, 0.2); transform: scale(0.95); }
            50% { box-shadow: 0 0 14px rgba(0, 230, 118, 0.5); transform: scale(1.1); }
            100% { box-shadow: 0 0 2px rgba(0, 230, 118, 0.2); transform: scale(0.95); }
        }

        .status-label {
            font-size: 9px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.5);
        }

        .status-count,
        #views-counter .count {
            font-size: 11px;
            font-weight: 800;
            color: #fff;
        }

        .status-count.glowing {
            color: #00E676;
        }

        #views-counter .label {
            font-size: 8px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.3);
        }

        #views-counter .icon {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.3);
        }

        .stars {
            display: flex;
            gap: 1px;
        }

        .star {
            font-size: 10px;
            color: #444;
        }

        .star.active {
            color: #FF8C00;
        }

        .rating-text {
            font-size: 8px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.3);
        }

        .rating-text strong {
            color: rgba(255, 255, 255, 0.7);
        }

        #footer a {
            color: #FF8C00;
            text-decoration: none;
            font-weight: 700;
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 20px;
            background: rgba(255, 140, 0, 0.06);
            border: 1px solid rgba(255, 140, 0, 0.06);
            white-space: nowrap;
            line-height: 1;
        }

        #share-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.4);
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            white-space: nowrap;
            line-height: 1.2;
        }

        .feedback-btn {
            background: rgba(255, 140, 0, 0.06) !important;
            border-color: rgba(255, 140, 0, 0.06) !important;
            color: #FF8C00 !important;
        }

        /* --- ПОПАП --- */
        #popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(16px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            padding: 16px;
        }

        #popup-content {
            background: rgba(20, 20, 25, 0.95);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 24px 20px;
            border-radius: 28px;
            text-align: center;
            max-width: 300px;
            width: 100%;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8);
            position: relative;
        }

        #popup-content h2 {
            font-size: 20px;
            font-weight: 900;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        #popup-content h2 span {
            font-size: 24px;
        }

        #popup-content .subtitle {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.4;
            margin-bottom: 16px;
        }

        #popup-button {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, #FF8C00, #FF6A00);
            color: #fff;
            padding: 12px 24px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            box-shadow: 0 4px 20px rgba(255, 140, 0, 0.2);
            width: 100%;
            justify-content: center;
        }

        #popup-close {
            position: absolute;
            top: 10px;
            right: 14px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.15);
            font-size: 18px;
            cursor: pointer;
        }

        #popup-timer {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.1);
            margin-top: 10px;
        }

        #popup-timer span {
            color: #FF8C00;
            font-weight: 700;
        }

        /* --- МОДАЛКА --- */
        #feedback-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(16px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        #feedback-modal.show {
            display: flex;
        }

        #feedback-content {
            background: rgba(20, 20, 25, 0.95);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 24px 20px;
            max-width: 340px;
            width: 100%;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8);
        }

        #feedback-content h3 {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 2px;
        }

        #feedback-content .sub {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 12px;
        }

        #feedback-content textarea {
            width: 100%;
            padding: 10px 12px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #fff;
            font-size: 13px;
            resize: vertical;
            min-height: 70px;
            font-family: 'Inter', sans-serif;
        }

        #feedback-content textarea:focus {
            outline: none;
            border-color: rgba(255, 140, 0, 0.3);
        }

        #feedback-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        #feedback-actions button {
            flex: 1;
            padding: 10px;
            border-radius: 30px;
            border: none;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
        }

        #feedback-send {
            background: linear-gradient(135deg, #FF8C00, #FF6A00);
            color: #fff;
        }

        #feedback-cancel {
            background: rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.4);
        }

        /* --- СПЕЦИАЛЬНО ДЛЯ ТЕЛЕФОНА --- */
        @media (max-width: 420px) {
            #header {
                padding: 8px 12px;
            }
            #header h1 {
                font-size: 14px;
            }
            #header h1 span {
                font-size: 16px;
            }
            #greeting {
                font-size: 9px;
            }
            #refresh-btn {
                font-size: 10px;
                padding: 4px 12px;
            }
            #footer {
                padding: 6px 10px;
                min-height: 38px;
            }
            #footer .date {
                font-size: 9px;
            }
            .status-label {
                font-size: 8px;
            }
            .status-count,
            #views-counter .count {
                font-size: 10px;
            }
            .status-dot {
                width: 5px;
                height: 5px;
            }
            #views-counter .label {
                font-size: 7px;
            }
            #views-counter .icon {
                font-size: 8px;
            }
            .star {
                font-size: 9px;
            }
            .rating-text {
                font-size: 7px;
            }
            #footer a {
                font-size: 10px;
                padding: 3px 7px;
            }
            #share-btn {
                font-size: 9px;
                padding: 3px 7px;
            }
            .status-indicator,
            #views-counter,
            #rating-container {
                padding: 2px 6px;
                gap: 2px;
            }
        }

        @media (max-width: 360px) {
            #header h1 {
                font-size: 12px;
            }
            #header h1 span {
                font-size: 14px;
            }
            #greeting {
                display: none;
            }
            .status-label {
                display: none;
            }
            #views-counter .label {
                display: none;
            }
            .rating-text {
                display: none;
            }
            #footer {
                min-height: 32px;
                padding: 4px 8px;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- ШАПКА -->
        <div id="header">
            <div id="header-top">
                <h1>
                    <span>⛽</span> Заправки Тула
                    <span id="greeting">☀️</span>
                </h1>
                <button id="refresh-btn" onclick="refreshMap()">↻</button>
            </div>
        </div>

        <!-- КАРТА -->
        <div id="map-container">
            <div id="loading">
                <div class="spinner"></div>
                <p>Загружаем...</p>
            </div>
            <iframe id="map-frame" src=""></iframe>
        </div>

        <!-- НИЖНЯЯ ПАНЕЛЬ (ПОВЫШЕ) -->
        <div id="footer">
            <div id="footer-left">
                <span class="date">📅 <span id="time-label"></span></span>
                <div class="status-indicator">
                    <span class="status-dot"></span>
                    <span class="status-label">Есть</span>
                    <span class="status-count glowing" id="green-count">12</span>
                </div>
                <div id="views-counter">
                    <span class="icon">👁️</span>
                    <span class="count" id="views-count">7518</span>
                    <span class="label">просмотров</span>
                </div>
                <div id="rating-container">
                    <div class="stars" id="stars-container">
                        <span class="star active">★</span>
                        <span class="star active">★</span>
                        <span class="star active">★</span>
                        <span class="star active">★</span>
                        <span class="star">★</span>
                    </div>
                    <span class="rating-text"><strong id="rating-value">4.8</strong>/5</span>
                </div>
            </div>
            <div id="footer-right">
                <button id="share-btn" onclick="sharePage()">📤</button>
                <button id="share-btn" class="feedback-btn" onclick="openFeedback()">💬</button>
                <a href="https://t.me/Zapravoil" target="_blank">📍</a>
            </div>
        </div>
    </div>

    <!-- ПОПАП -->
    <div id="popup-overlay">
        <div id="popup-content">
            <button id="popup-close" onclick="closePopup()">✕</button>
            <h2><span>⛽</span> Подпишись!</h2>
            <p class="subtitle">Чтобы zawsze знать, <strong>где есть бензин</strong> в Туле.</p>
            <a href="https://t.me/Zapravoil" target="_blank" id="popup-button">
                Перейти в канал →
            </a>
            <div id="popup-timer">Закроется через <span id="countdown">10</span> сек</div>
        </div>
    </div>

    <!-- МОДАЛКА -->
    <div id="feedback-modal">
        <div id="feedback-content">
            <h3>💬 Сообщить</h3>
            <p class="sub">Нашли неточность? Напишите!</p>
            <textarea id="feedback-text" placeholder="Например: на АЗС №5 закончился 95-й..."></textarea>
            <div id="feedback-actions">
                <button id="feedback-cancel" onclick="closeFeedback()">Отмена</button>
                <button id="feedback-send" onclick="sendFeedback()">Отправить</button>
            </div>
        </div>
    </div>

    <script>
        // === ИНИЦИАЛИЗАЦИЯ TELEGRAM WEB APP ===
        let tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
            console.log('✅ Telegram Web App инициализирован');
        } else {
            console.log('⚠️ Telegram Web App не найден');
        }

        // === ПРИНУДИТЕЛЬНАЯ УСТАНОВКА ВЫСОТЫ ===
        function fixHeight() {
            const vh = window.innerHeight;
            document.documentElement.style.height = vh + 'px';
            document.body.style.height = vh + 'px';
            if (tg) {
                tg.expand();
            }
        }

        // === КОНФИГУРАЦИЯ ===
        const MAP_URL = 'https://www.google.com/maps/d/u/0/embed?mid=189xI53EXgDdXl5Ffhype8F7HCA2IVFI&ehbc=2E312F';
        const STATIONS_DATA = { green: 12 };
        const RATING = { value: 4.8 };
        const VIEWS = 7518;

        // === ПРИВЕТСТВИЕ ===
        (function setGreeting() {
            const hour = new Date().getHours();
            let emoji = '';
            if (hour >= 5 && hour < 12) emoji = '☀️ Доброе утро!';
            else if (hour >= 12 && hour < 18) emoji = '🌤️ Добрый день!';
            else if (hour >= 18 && hour < 23) emoji = '🌆 Добрый вечер!';
            else emoji = '🌙 Доброй ночи!';
            document.getElementById('greeting').textContent = emoji;
        })();

        // === ДАТА ===
        (function setDate() {
            const now = new Date();
            document.getElementById('time-label').textContent = now.toLocaleDateString('ru-RU', {
                day: 'numeric',
                month: 'short'
            });
        })();

        // === ОБНОВЛЕНИЕ ===
        function updateData() {
            document.getElementById('green-count').textContent = STATIONS_DATA.green;
            document.getElementById('rating-value').textContent = RATING.value.toFixed(1);
            document.getElementById('views-count').textContent = VIEWS;

            const stars = document.querySelectorAll('.star');
            const rating = RATING.value;
            stars.forEach((star, index) => {
                const val = index + 1;
                if (val <= Math.floor(rating)) {
                    star.classList.add('active');
                } else if (val === Math.ceil(rating) && rating % 1 >= 0.5) {
                    star.classList.add('active');
                } else {
                    star.classList.remove('active');
                }
            });
        }
        updateData();

        // === КАРТА ===
        let loadAttempts = 0;
        const MAX_ATTEMPTS = 3;
        const mapFrame = document.getElementById('map-frame');
        const loading = document.getElementById('loading');

        function loadMap() {
            loading.style.display = 'block';
            mapFrame.src = MAP_URL;
        }

        function refreshMap() {
            loadAttempts = 0;
            loading.style.display = 'block';
            mapFrame.src = '';
            setTimeout(() => {
                mapFrame.src = MAP_URL;
                setTimeout(() => {
                    updateData();
                    fixHeight();
                }, 200);
            }, 150);
        }

        mapFrame.addEventListener('load', function() {
            loading.style.display = 'none';
            fixHeight();
        });

        setTimeout(function checkLoaded() {
            if (loading.style.display !== 'none' && loadAttempts < MAX_ATTEMPTS) {
                loadAttempts++;
                mapFrame.src = MAP_URL;
                setTimeout(checkLoaded, 4000);
            }
        }, 5000);

        // === ПОПАП ===
        const popup = document.getElementById('popup-overlay');
        let countdownInterval;
        let countdownValue = 10;

        function closePopup() {
            popup.style.display = 'none';
            if (countdownInterval) clearInterval(countdownInterval);
            fixHeight();
        }

        function startCountdown() {
            const timerElement = document.getElementById('countdown');
            countdownValue = 10;
            timerElement.textContent = countdownValue;
            countdownInterval = setInterval(() => {
                countdownValue--;
                timerElement.textContent = countdownValue;
                if (countdownValue <= 0) {
                    clearInterval(countdownInterval);
                    closePopup();
                }
            }, 1000);
        }

        // === ШАРИНГ ===
        function sharePage() {
            if (navigator.share) {
                navigator.share({
                    title: 'Заправки Тула',
                    text: 'Актуальная карта заправок в Туле',
                    url: window.location.href
                }).catch(() => {});
            } else {
                navigator.clipboard.writeText(window.location.href).then(() => {
                    alert('Ссылка скопирована!');
                }).catch(() => {});
            }
        }

        // === ФОРМА ===
        function openFeedback() {
            document.getElementById('feedback-modal').classList.add('show');
        }

        function closeFeedback() {
            document.getElementById('feedback-modal').classList.remove('show');
            fixHeight();
        }

        function sendFeedback() {
            const text = document.getElementById('feedback-text').value.trim();
            if (!text) {
                alert('Напишите сообщение!');
                return;
            }

            const BOT_TOKEN = 'ВАШ_ТОКЕН_БОТА';
            const CHAT_ID = 'ВАШ_TELEGRAM_ID';

            if (BOT_TOKEN === 'ВАШ_ТОКЕН_БОТА') {
                alert('✅ Сообщение: "' + text + '"\n\nНастройте бота, чтобы оно приходило вам в Telegram.');
                closeFeedback();
                document.getElementById('feedback-text').value = '';
                return;
            }

            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            const message = `📩 *Новое сообщение с карты*\n\n${text}`;

            fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CHAT_ID, text: message, parse_mode: 'Markdown' })
                })
                .then(() => {
                    alert('✅ Сообщение отправлено! Спасибо!');
                    closeFeedback();
                    document.getElementById('feedback-text').value = '';
                })
                .catch(() => {
                    alert('❌ Ошибка отправки. Попробуйте позже.');
                });
        }

        // === ЗАПУСК ===
        fixHeight();
        loadMap();
        startCountdown();

        if (sessionStorage.getItem('popupShown') === 'true') {
            popup.style.display = 'none';
            clearInterval(countdownInterval);
        } else {
            popup.style.display = 'flex';
        }
        sessionStorage.setItem('popupShown', 'true');

        // === ПЕРЕХВАТ ИЗМЕНЕНИЙ РАЗМЕРА ===
        window.addEventListener('resize', fixHeight);
        window.addEventListener('orientationchange', function() {
            setTimeout(fixHeight, 300);
        });

        // === ПЕРИОДИЧЕСКАЯ ПРОВЕРКА ВЫСОТЫ ===
        setInterval(fixHeight, 500);
    </script>
</body>
</html>
