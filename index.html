<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Заправки Тула</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: #08080a;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            color: #fff;
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            background: radial-gradient(ellipse at 50% 0%, #141416, #08080a 70%);
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            padding: 8px 10px 8px 10px;
            gap: 6px;
        }

        /* --- ШАПКА --- */
        #header {
            background: linear-gradient(135deg, #FF8C00, #FF6A00);
            padding: 10px 16px;
            border-radius: 16px;
            flex-shrink: 0;
            z-index: 10;
            box-shadow: 0 4px 20px rgba(255, 140, 0, 0.2);
        }

        #header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        #header h1 {
            font-size: 18px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #fff;
            text-shadow: 0 1px 10px rgba(0, 0, 0, 0.15);
        }

        #header h1 span {
            font-size: 20px;
        }

        #greeting {
            font-size: 11px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
            margin-left: 4px;
        }

        #refresh-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            flex-shrink: 0;
            white-space: nowrap;
            min-height: 38px;
            min-width: 60px;
            transition: all 0.2s ease;
            backdrop-filter: blur(4px);
        }

        #refresh-btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        #refresh-btn:active {
            transform: scale(0.95);
        }

        /* --- ПАНЕЛЬ УПРАВЛЕНИЯ (только "Я здесь") --- */
        #map-controls {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
            justify-content: center;
        }

        .map-control-btn {
            background: rgba(20, 20, 30, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.6);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 4px;
            min-height: 30px;
            white-space: nowrap;
        }

        .map-control-btn:hover {
            background: rgba(255, 140, 0, 0.12);
            border-color: rgba(255, 140, 0, 0.15);
            color: #fff;
        }

        .map-control-btn .icon {
            font-size: 14px;
        }

        /* --- КАРТА --- */
        #map-container {
            flex: 1;
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            background: #0f0f12;
            border: 1px solid rgba(255, 255, 255, 0.04);
            min-height: 0;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
        }

        #map-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            filter: saturate(1.05) contrast(1.02);
        }

        /* --- ЗАГРУЗКА --- */
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 5;
            pointer-events: none;
        }

        #loading .spinner {
            width: 32px;
            height: 32px;
            border: 2px solid rgba(255, 255, 255, 0.04);
            border-top: 2px solid #FF8C00;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 8px;
            box-shadow: 0 0 20px rgba(255, 140, 0, 0.05);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #loading p {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.08);
        }

        /* --- НИЖНЯЯ ПАНЕЛЬ --- */
        #footer {
            background: rgba(16, 16, 20, 0.85);
            backdrop-filter: blur(12px);
            padding: 10px 14px;
            border-radius: 16px;
            flex-shrink: 0;
            border: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 6px 10px;
            min-height: 52px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
            font-weight: 500;
            width: 100%;
        }

        #footer-left {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px 10px;
            flex: 1 1 auto;
        }

        #footer-right {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        #footer .date {
            font-weight: 600;
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }

        .status-indicator,
        #views-counter,
        #rating-container {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px 4px 8px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            background: rgba(255, 255, 255, 0.02);
            white-space: nowrap;
            min-height: 28px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #00E676;
            box-shadow: 0 0 10px rgba(0, 230, 118, 0.2);
            animation: pulse-green 2s ease-in-out infinite;
            flex-shrink: 0;
        }

        @keyframes pulse-green {
            0% { opacity: 1; transform: scale(0.95); }
            50% { opacity: 0.7; transform: scale(1.05); }
            100% { opacity: 1; transform: scale(0.95); }
        }

        .status-label {
            font-size: 10px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.3);
        }

        .status-count,
        #views-counter .count {
            font-size: 13px;
            font-weight: 700;
            color: #fff;
        }

        .status-count.glowing {
            color: #00E676;
            text-shadow: 0 0 20px rgba(0, 230, 118, 0.1);
        }

        #views-counter .label {
            font-size: 9px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.2);
        }

        #views-counter .icon {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.2);
        }

        .stars {
            display: flex;
            gap: 1px;
        }

        .star {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.06);
        }

        .star.active {
            color: #FF8C00;
            text-shadow: 0 0 10px rgba(255, 140, 0, 0.1);
        }

        .rating-text {
            font-size: 9px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.2);
        }

        .rating-text strong {
            color: rgba(255, 255, 255, 0.4);
        }

        #footer a {
            color: rgba(255, 140, 0, 0.6);
            text-decoration: none;
            font-weight: 600;
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 40px;
            background: rgba(255, 140, 0, 0.04);
            border: 1px solid rgba(255, 140, 0, 0.04);
            white-space: nowrap;
            line-height: 1;
            min-height: 28px;
            display: flex;
            align-items: center;
            transition: all 0.2s ease;
        }

        #footer a:hover {
            background: rgba(255, 140, 0, 0.08);
            color: #FF8C00;
        }

        #share-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.25);
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            white-space: nowrap;
            line-height: 1.2;
            min-height: 28px;
            display: flex;
            align-items: center;
            transition: all 0.2s ease;
        }

        #share-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.6);
        }

        .feedback-btn {
            background: rgba(255, 140, 0, 0.04) !important;
            border-color: rgba(255, 140, 0, 0.04) !important;
            color: rgba(255, 140, 0, 0.3) !important;
        }

        .feedback-btn:hover {
            background: rgba(255, 140, 0, 0.08) !important;
            color: #FF8C00 !important;
        }

        /* --- ПОПАП --- */
        #popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }

        #popup-content {
            background: #18181e;
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 32px 28px;
            border-radius: 28px;
            text-align: center;
            max-width: 340px;
            width: 100%;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
            position: relative;
        }

        #popup-content h2 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #fff;
        }

        #popup-content h2 span {
            font-size: 28px;
        }

        #popup-content .subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.3);
            line-height: 1.5;
            margin-bottom: 20px;
        }

        #popup-content .subtitle strong {
            color: rgba(255, 255, 255, 0.6);
        }

        #popup-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #FF8C00, #FF6A00);
            color: #fff;
            padding: 14px 32px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 15px;
            box-shadow: 0 4px 20px rgba(255, 140, 0, 0.15);
            width: 100%;
            justify-content: center;
            min-height: 48px;
            transition: all 0.2s ease;
        }

        #popup-button:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 30px rgba(255, 140, 0, 0.2);
        }

        #popup-close {
            position: absolute;
            top: 12px;
            right: 16px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.08);
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            transition: color 0.2s ease;
        }

        #popup-close:hover {
            color: rgba(255, 255, 255, 0.3);
        }

        #popup-timer {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.05);
            margin-top: 14px;
        }

        #popup-timer span {
            color: rgba(255, 140, 0, 0.3);
            font-weight: 600;
        }

        /* --- МОДАЛКА --- */
        #feedback-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #feedback-modal.show {
            display: flex;
        }

        #feedback-content {
            background: #18181e;
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 24px;
            padding: 28px 24px;
            max-width: 380px;
            width: 100%;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
        }

        #feedback-content h3 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        #feedback-content .sub {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.3);
            margin-bottom: 16px;
        }

        #feedback-content textarea {
            width: 100%;
            padding: 12px 14px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: #fff;
            font-size: 14px;
            resize: vertical;
            min-height: 80px;
            font-family: 'Inter', sans-serif;
            transition: border 0.2s ease;
        }

        #feedback-content textarea:focus {
            outline: none;
            border-color: rgba(255, 140, 0, 0.15);
        }

        #feedback-content textarea::placeholder {
            color: rgba(255, 255, 255, 0.08);
        }

        #feedback-actions {
            display: flex;
            gap: 10px;
            margin-top: 14px;
        }

        #feedback-actions button {
            flex: 1;
            padding: 12px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            min-height: 44px;
            transition: all 0.2s ease;
        }

        #feedback-send {
            background: linear-gradient(135deg, #FF8C00, #FF6A00);
            color: #fff;
        }

        #feedback-send:hover {
            transform: scale(1.02);
        }

        #feedback-cancel {
            background: rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.3);
        }

        #feedback-cancel:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        /* --- АДАПТИВ --- */
        @media (max-width: 480px) {
            #app { padding: 6px 8px; gap: 4px; }
            #header { padding: 8px 12px; border-radius: 12px; }
            #header h1 { font-size: 15px; }
            #header h1 span { font-size: 17px; }
            #greeting { font-size: 9px; }
            #refresh-btn { font-size: 12px; padding: 5px 12px; min-height: 32px; min-width: 56px; }
            .map-control-btn { font-size: 10px; padding: 4px 10px; min-height: 26px; }
            .map-control-btn .icon { font-size: 12px; }
            #footer { padding: 8px 10px; min-height: 44px; border-radius: 12px; gap: 4px 6px; font-size: 10px; }
            #footer .date { font-size: 10px; }
            .status-label { font-size: 9px; }
            .status-count, #views-counter .count { font-size: 11px; }
            .status-dot { width: 5px; height: 5px; }
            #views-counter .label { font-size: 8px; }
            .star { font-size: 10px; }
            .rating-text { font-size: 8px; }
            #footer a { font-size: 10px; padding: 3px 10px; min-height: 26px; }
            #share-btn { font-size: 10px; padding: 3px 10px; min-height: 26px; }
            .status-indicator, #views-counter, #rating-container { padding: 3px 8px; min-height: 24px; gap: 3px; }
            #map-container { border-radius: 12px; }
            #popup-content { padding: 24px 20px; max-width: 300px; }
            #popup-content h2 { font-size: 20px; }
            #popup-button { font-size: 14px; padding: 12px 24px; min-height: 42px; }
        }

        @media (max-width: 380px) {
            #header h1 { font-size: 13px; }
            #greeting { display: none; }
            #refresh-btn { font-size: 10px; padding: 4px 10px; min-width: 46px; }
            .map-control-btn { font-size: 9px; padding: 3px 8px; }
            .map-control-btn .icon { font-size: 10px; }
            .status-label { display: none; }
            #views-counter .label { display: none; }
            .rating-text { display: none; }
            #footer { min-height: 36px; padding: 4px 8px; }
            .star { font-size: 8px; }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- ШАПКА -->
        <div id="header">
            <div id="header-top">
                <h1>
                    <span>⛽</span> Заправки Тула
                    <span id="greeting">☀️</span>
                </h1>
                <button id="refresh-btn" onclick="refreshMap()">↻</button>
            </div>
        </div>

        <!-- ПАНЕЛЬ УПРАВЛЕНИЯ (только "Я здесь") -->
        <div id="map-controls">
            <button class="map-control-btn" onclick="goToMyLocation()">
                <span class="icon">📍</span> Я здесь
            </button>
        </div>

        <!-- КАРТА -->
        <div id="map-container">
            <div id="loading">
                <div class="spinner"></div>
                <p>Загружаем...</p>
            </div>
            <iframe id="map-frame" src=""></iframe>
        </div>

        <!-- НИЖНЯЯ ПАНЕЛЬ -->
        <div id="footer">
            <div id="footer-left">
                <span class="date">📅 <span id="time-label"></span></span>
                <div class="status-indicator">
                    <span class="status-dot"></span>
                    <span class="status-label">Есть</span>
                    <span class="status-count glowing" id="green-count">13</span>
                </div>
                <div id="views-counter">
                    <span class="icon">👁️</span>
                    <span class="count" id="views-count">7739</span>
                    <span class="label">просмотров</span>
                </div>
                <div id="rating-container">
                    <div class="stars" id="stars-container">
                        <span class="star active">★</span>
                        <span class="star active">★</span>
                        <span class="star active">★</span>
                        <span class="star active">★</span>
                        <span class="star">★</span>
                    </div>
                    <span class="rating-text"><strong id="rating-value">4.8</strong>/5</span>
                </div>
            </div>
            <div id="footer-right">
                <button id="share-btn" onclick="sharePage()">📤</button>
                <button id="share-btn" class="feedback-btn" onclick="openFeedback()">💬</button>
                <a href="https://t.me/Zapravoil" target="_blank">📍</a>
            </div>
        </div>
    </div>

    <!-- ПОПАП -->
    <div id="popup-overlay">
        <div id="popup-content">
            <button id="popup-close" onclick="closePopup()">✕</button>
            <h2><span>⛽</span> Подпишись!</h2>
            <p class="subtitle">Чтобы знать, <strong>где есть бензин</strong> в Туле.</p>
            <a href="https://t.me/Zapravoil" target="_blank" id="popup-button">
                Перейти в канал →
            </a>
            <div id="popup-timer">Закроется через <span id="countdown">10</span> сек</div>
        </div>
    </div>

    <!-- МОДАЛКА -->
    <div id="feedback-modal">
        <div id="feedback-content">
            <h3>💬 Сообщить</h3>
            <p class="sub">Нашли неточность? Напишите!</p>
            <textarea id="feedback-text" placeholder="Например: на АЗС №5 закончился 95-й..."></textarea>
            <div id="feedback-actions">
                <button id="feedback-cancel" onclick="closeFeedback()">Отмена</button>
                <button id="feedback-send" onclick="sendFeedback()">Отправить</button>
            </div>
        </div>
    </div>

    <script>
        // === ИНИЦИАЛИЗАЦИЯ TELEGRAM WEB APP ===
        let tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
            console.log('✅ Telegram Web App инициализирован');
        } else {
            console.log('⚠️ Telegram Web App не найден');
        }

        // === ПРИНУДИТЕЛЬНАЯ УСТАНОВКА ВЫСОТЫ ===
        function fixHeight() {
            const vh = window.innerHeight;
            document.documentElement.style.height = vh + 'px';
            document.body.style.height = vh + 'px';
            if (tg) {
                tg.expand();
            }
        }

        // === КОНФИГУРАЦИЯ ===
        const MAP_URL = 'https://yandex.ru/map-widget/v1/?um=constructor%3A88473f3d5376c583d56399160a83a27ef0e2c029de801f9cdf7705c908b343d3&source=constructor';
        const STATIONS_DATA = { green: 13 };
        const RATING = { value: 4.8 };
        const VIEWS = 7739;

        // === ГЕОЛОКАЦИЯ ===
        function goToMyLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    function(pos) {
                        const lat = pos.coords.latitude;
                        const lon = pos.coords.longitude;
                        const newUrl = MAP_URL + `&ll=${lon},${lat}&z=15`;
                        document.getElementById('map-frame').src = newUrl;
                        showToast('📍 Карта центрирована по вашему местоположению');
                    },
                    function() {
                        showToast('❌ Не удалось определить местоположение. Разрешите доступ к геолокации.');
                    }
                );
            } else {
                showToast('❌ Геолокация не поддерживается вашим браузером');
            }
        }

        // === TOAST ===
        function showToast(message) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                bottom: 80px;
                left: 50%;
                transform: translateX(-50%);
                background: rgba(20,20,30,0.9);
                backdrop-filter: blur(12px);
                color: #fff;
                padding: 10px 20px;
                border-radius: 16px;
                font-size: 13px;
                font-weight: 500;
                border: 1px solid rgba(255,255,255,0.04);
                box-shadow: 0 10px 40px rgba(0,0,0,0.6);
                z-index: 999;
                opacity: 0;
                transition: opacity 0.3s ease;
                max-width: 90%;
                text-align: center;
                font-family: 'Inter', sans-serif;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '1'; }, 50);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 400);
            }, 2500);
        }

        // === ПРИВЕТСТВИЕ ===
        (function setGreeting() {
            const hour = new Date().getHours();
            let emoji = '';
            if (hour >= 5 && hour < 12) emoji = '☀️ Доброе утро!';
            else if (hour >= 12 && hour < 18) emoji = '🌤️ Добрый день!';
            else if (hour >= 18 && hour < 23) emoji = '🌆 Добрый вечер!';
            else emoji = '🌙 Доброй ночи!';
            document.getElementById('greeting').textContent = emoji;
        })();

        // === ДАТА ===
        (function setDate() {
            const now = new Date();
            document.getElementById('time-label').textContent = now.toLocaleDateString('ru-RU', {
                day: 'numeric',
                month: 'short'
            });
        })();

        // === ОБНОВЛЕНИЕ ===
        function updateData() {
            document.getElementById('green-count').textContent = STATIONS_DATA.green;
            document.getElementById('rating-value').textContent = RATING.value.toFixed(1);
            document.getElementById('views-count').textContent = VIEWS;

            const stars = document.querySelectorAll('.star');
            const rating = RATING.value;
            stars.forEach((star, index) => {
                const val = index + 1;
                if (val <= Math.floor(rating)) {
                    star.classList.add('active');
                } else if (val === Math.ceil(rating) && rating % 1 >= 0.5) {
                    star.classList.add('active');
                } else {
                    star.classList.remove('active');
                }
            });
        }
        updateData();

        // === КАРТА ===
        let loadAttempts = 0;
        const MAX_ATTEMPTS = 3;
        const mapFrame = document.getElementById('map-frame');
        const loading = document.getElementById('loading');

        function loadMap() {
            loading.style.display = 'block';
            mapFrame.src = MAP_URL;
        }

        function refreshMap() {
            loadAttempts = 0;
            loading.style.display = 'block';
            mapFrame.src = '';
            setTimeout(() => {
                mapFrame.src = MAP_URL;
                setTimeout(() => {
                    updateData();
                    fixHeight();
                }, 200);
            }, 150);
        }

        mapFrame.addEventListener('load', function() {
            loading.style.display = 'none';
            fixHeight();
        });

        setTimeout(function checkLoaded() {
            if (loading.style.display !== 'none' && loadAttempts < MAX_ATTEMPTS) {
                loadAttempts++;
                mapFrame.src = MAP_URL;
                setTimeout(checkLoaded, 4000);
            }
        }, 5000);

        // === ПОПАП ===
        const popup = document.getElementById('popup-overlay');
        let countdownInterval;
        let countdownValue = 10;

        function closePopup() {
            popup.style.display = 'none';
            if (countdownInterval) clearInterval(countdownInterval);
            fixHeight();
        }

        function startCountdown() {
            const timerElement = document.getElementById('countdown');
            countdownValue = 10;
            timerElement.textContent = countdownValue;
            countdownInterval = setInterval(() => {
                countdownValue--;
                timerElement.textContent = countdownValue;
                if (countdownValue <= 0) {
                    clearInterval(countdownInterval);
                    closePopup();
                }
            }, 1000);
        }

        // === ШАРИНГ ===
        function sharePage() {
            const shareText = '⛽ Заправки Тула — актуальная карта АЗС с ценами и очередями!\n\nОткрой карту: ' + window.location.href;
            if (navigator.share) {
                navigator.share({
                    title: 'Заправки Тула',
                    text: shareText,
                    url: window.location.href
                }).catch(() => {});
            } else {
                navigator.clipboard.writeText(shareText).then(() => {
                    alert('📋 Ссылка скопирована! Поделитесь с друзьями-водителями.');
                }).catch(() => {});
            }
        }

        // === ФОРМА ===
        function openFeedback() {
            document.getElementById('feedback-modal').classList.add('show');
        }

        function closeFeedback() {
            document.getElementById('feedback-modal').classList.remove('show');
            fixHeight();
        }

        function sendFeedback() {
            const text = document.getElementById('feedback-text').value.trim();
            if (!text) {
                alert('Напишите сообщение!');
                return;
            }

            const BOT_TOKEN = 'ВАШ_ТОКЕН_БОТА';
            const CHAT_ID = 'ВАШ_TELEGRAM_ID';

            if (BOT_TOKEN === 'ВАШ_ТОКЕН_БОТА') {
                alert('✅ Сообщение: "' + text + '"\n\nНастройте бота, чтобы оно приходило вам в Telegram.');
                closeFeedback();
                document.getElementById('feedback-text').value = '';
                return;
            }

            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            const message = `📩 *Новое сообщение с карты*\n\n${text}`;

            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: message, parse_mode: 'Markdown' })
            })
            .then(() => {
                alert('✅ Сообщение отправлено! Спасибо!');
                closeFeedback();
                document.getElementById('feedback-text').value = '';
            })
            .catch(() => {
                alert('❌ Ошибка отправки. Попробуйте позже.');
            });
        }

        // === ЗАПУСК ===
        fixHeight();
        loadMap();
        startCountdown();

        if (sessionStorage.getItem('popupShown') === 'true') {
            popup.style.display = 'none';
            clearInterval(countdownInterval);
        } else {
            popup.style.display = 'flex';
        }
        sessionStorage.setItem('popupShown', 'true');

        window.addEventListener('resize', fixHeight);
        window.addEventListener('orientationchange', function() {
            setTimeout(fixHeight, 300);
        });

        setInterval(fixHeight, 500);
    </script>
</body>
</html>
