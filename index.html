<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Заправки Тула</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #08080a;
            color: #fff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100%;
            background: radial-gradient(ellipse at 50% 0%, #141416, #08080a 70%);
            flex: 1;
        }

        /* --- ШАПКА --- */
        #header {
            background: linear-gradient(135deg, #FF8C00, #FF6A00);
            padding: 12px 16px 10px 16px;
            flex-shrink: 0;
            z-index: 10;
            box-shadow: 0 4px 30px rgba(255, 140, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        #header::before {
            content: '';
            position: absolute;
            top: -60%;
            right: -20%;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            pointer-events: none;
        }

        #header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 1;
            gap: 8px;
            flex-wrap: nowrap;
        }

        #header h1 {
            font-size: clamp(16px, 4vw, 22px);
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #fff;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.15);
            letter-spacing: -0.5px;
            white-space: nowrap;
        }

        #header h1 span {
            font-size: clamp(20px, 5vw, 26px);
        }

        #greeting {
            font-size: clamp(10px, 2.5vw, 13px);
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
            margin-left: 4px;
        }

        #refresh-btn {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 8px 16px;
            border-radius: 50px;
            font-size: clamp(11px, 2.5vw, 14px);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Inter', sans-serif;
            flex-shrink: 0;
            white-space: nowrap;
        }

        #refresh-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.02);
        }

        #refresh-btn:active {
            transform: scale(0.95);
        }

        /* --- КАРТА --- */
        #map-container {
            flex: 1;
            position: relative;
            margin: 6px 8px 8px 8px;
            border-radius: 20px;
            overflow: hidden;
            background: #0a0a0c;
            box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.6), 0 8px 30px rgba(0, 0, 0, 0.5);
            min-height: 0;
        }

        #map-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            filter: saturate(1.1) contrast(1.02);
        }

        /* --- ЗАГРУЗКА --- */
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 5;
            pointer-events: none;
        }

        #loading .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 140, 0, 0.08);
            border-top: 3px solid #FF8C00;
            border-radius: 50%;
            animation: spin 0.9s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        #loading p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.15);
            letter-spacing: 0.5px;
        }

        /* --- НИЖНЯЯ ПАНЕЛЬ (ТЕПЕРЬ ВСЕГДА ВИДНА) --- */
        #footer {
            background: rgba(12, 12, 16, 0.95);
            backdrop-filter: blur(20px);
            padding: 10px 12px;
            flex-shrink: 0;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 6px 8px;
            font-size: 12px;
            color: #666;
            font-weight: 500;
            min-height: 48px;
        }

        #footer-left {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px 10px;
            flex: 1 1 auto;
        }

        #footer-right {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
            flex-shrink: 0;
        }

        #footer .date {
            font-weight: 700;
            color: rgba(255, 255, 255, 0.8);
            font-size: clamp(11px, 2.5vw, 14px);
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }

        .status-indicator,
        #views-counter,
        #rating-container {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px 3px 8px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.03);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #00E676;
            box-shadow: 0 0 12px rgba(0, 230, 118, 0.4);
            animation: pulse-green 2s ease-in-out infinite;
            flex-shrink: 0;
        }

        @keyframes pulse-green {
            0% {
                box-shadow: 0 0 4px rgba(0, 230, 118, 0.2);
                transform: scale(0.95);
            }
            50% {
                box-shadow: 0 0 20px rgba(0, 230, 118, 0.6);
                transform: scale(1.1);
            }
            100% {
                box-shadow: 0 0 4px rgba(0, 230, 118, 0.2);
                transform: scale(0.95);
            }
        }

        .status-label {
            font-size: clamp(10px, 2vw, 12px);
            font-weight: 600;
            color: rgba(255, 255, 255, 0.6);
        }

        .status-count,
        #views-counter .count {
            font-size: clamp(13px, 2.8vw, 15px);
            font-weight: 800;
            color: #fff;
        }

        .status-count.glowing {
            color: #00E676;
            text-shadow: 0 0 20px rgba(0, 230, 118, 0.2);
        }

        #views-counter .label {
            font-size: clamp(9px, 1.8vw, 11px);
            font-weight: 500;
            color: rgba(255, 255, 255, 0.4);
        }

        #views-counter .icon {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
        }

        .stars {
            display: flex;
            gap: 1px;
        }

        .star {
            font-size: clamp(12px, 2.5vw, 16px);
            color: #444;
        }

        .star.active {
            color: #FF8C00;
            text-shadow: 0 0 12px rgba(255, 140, 0, 0.2);
        }

        .rating-text {
            font-size: clamp(9px, 1.8vw, 12px);
            font-weight: 600;
            color: rgba(255, 255, 255, 0.4);
        }

        .rating-text strong {
            color: rgba(255, 255, 255, 0.8);
        }

        #footer a {
            color: #FF8C00;
            text-decoration: none;
            font-weight: 700;
            font-size: clamp(11px, 2.2vw, 14px);
            padding: 3px 8px;
            border-radius: 30px;
            background: rgba(255, 140, 0, 0.06);
            border: 1px solid rgba(255, 140, 0, 0.06);
            white-space: nowrap;
        }

        #footer a:hover {
            background: rgba(255, 140, 0, 0.12);
        }

        #share-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.5);
            padding: 3px 10px;
            border-radius: 30px;
            font-size: clamp(10px, 2vw, 12px);
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            white-space: nowrap;
        }

        #share-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }

        .feedback-btn {
            background: rgba(255, 140, 0, 0.06) !important;
            border-color: rgba(255, 140, 0, 0.08) !important;
            color: #FF8C00 !important;
        }

        /* --- ПОПАП --- */
        #popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(16px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            padding: 20px;
        }

        #popup-content {
            background: rgba(20, 20, 25, 0.95);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 32px 24px 28px;
            border-radius: 32px;
            text-align: center;
            max-width: 340px;
            width: 100%;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            position: relative;
        }

        #popup-content h2 {
            font-size: clamp(22px, 5vw, 26px);
            font-weight: 900;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        #popup-content h2 span {
            font-size: clamp(26px, 6vw, 30px);
        }

        #popup-content .subtitle {
            font-size: clamp(13px, 3vw, 15px);
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.5;
            margin-bottom: 20px;
        }

        #popup-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #FF8C00, #FF6A00);
            color: #fff;
            padding: 14px 28px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: clamp(14px, 3vw, 16px);
            box-shadow: 0 4px 30px rgba(255, 140, 0, 0.2);
            width: 100%;
            justify-content: center;
        }

        #popup-close {
            position: absolute;
            top: 12px;
            right: 16px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.15);
            font-size: 20px;
            cursor: pointer;
            padding: 4px;
        }

        #popup-timer {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.1);
            margin-top: 14px;
        }

        #popup-timer span {
            color: #FF8C00;
            font-weight: 700;
        }

        /* --- МОДАЛКА --- */
        #feedback-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(16px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #feedback-modal.show {
            display: flex;
        }

        #feedback-content {
            background: rgba(20, 20, 25, 0.95);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 28px;
            padding: 28px 24px;
            max-width: 380px;
            width: 100%;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
        }

        #feedback-content h3 {
            font-size: clamp(20px, 4.5vw, 24px);
            font-weight: 800;
            margin-bottom: 4px;
        }

        #feedback-content .sub {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 16px;
        }

        #feedback-content textarea {
            width: 100%;
            padding: 12px 14px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #fff;
            font-size: 15px;
            resize: vertical;
            min-height: 80px;
            font-family: 'Inter', sans-serif;
        }

        #feedback-content textarea:focus {
            outline: none;
            border-color: rgba(255, 140, 0, 0.3);
        }

        #feedback-actions {
            display: flex;
            gap: 10px;
            margin-top: 14px;
        }

        #feedback-actions button {
            flex: 1;
            padding: 12px;
            border-radius: 40px;
            border: none;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
        }

        #feedback-send {
            background: linear-gradient(135deg, #FF8C00, #FF6A00);
            color: #fff;
        }

        #feedback-cancel {
            background: rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.4);
        }

        /* --- АДАПТИВНОСТЬ --- */
        @media (max-width: 420px) {
            #header {
                padding: 8px 12px;
            }
            #refresh-btn {
                padding: 6px 12px;
                font-size: 11px;
            }
            #header h1 {
                font-size: 15px;
            }
            #footer {
                padding: 6px 8px;
                gap: 4px;
            }
            #map-container {
                margin: 4px 6px 6px 6px;
                border-radius: 16px;
            }
            .status-indicator,
            #views-counter,
            #rating-container {
                padding: 2px 8px;
            }
        }

        @media (max-width: 360px) {
            #header h1 {
                font-size: 13px;
            }
            .status-label {
                font-size: 9px;
            }
            #footer .date {
                font-size: 10px;
            }
            #views-counter .label {
                font-size: 9px;
            }
            .rating-text {
                font-size: 9px;
            }
            .star {
                font-size: 11px;
            }
        }

        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- ШАПКА -->
        <div id="header">
            <div id="header-top">
                <h1>
                    <span>⛽</span> Заправки Тула
                    <span id="greeting">☀️</span>
                </h1>
                <button id="refresh-btn" onclick="refreshMap()">↻</button>
            </div>
        </div>

        <!-- КАРТА -->
        <div id="map-container">
            <div id="loading">
                <div class="spinner"></div>
                <p>Загружаем...</p>
            </div>
            <iframe id="map-frame" src=""></iframe>
        </div>

        <!-- НИЖНЯЯ ПАНЕЛЬ -->
        <div id="footer">
            <div id="footer-left">
                <span class="date">📅 <span id="time-label"></span></span>
                <div class="status-indicator">
                    <span class="status-dot"></span>
                    <span class="status-label">Есть</span>
                    <span class="status-count glowing" id="green-count">12</span>
                </div>
                <div id="views-counter">
                    <span class="icon">👁️</span>
                    <span class="count" id="views-count">7518</span>
                    <span class="label">просмотров</span>
                </div>
                <div id="rating-container">
                    <div class="stars" id="stars-container">
                        <span class="star active">★</span>
                        <span class="star active">★</span>
                        <span class="star active">★</span>
                        <span class="star active">★</span>
                        <span class="star">★</span>
                    </div>
                    <span class="rating-text"><strong id="rating-value">4.8</strong>/5</span>
                </div>
            </div>
            <div id="footer-right">
                <button id="share-btn" onclick="sharePage()">📤</button>
                <button id="share-btn" class="feedback-btn" onclick="openFeedback()">💬</button>
                <a href="https://t.me/Zapravoil" target="_blank">📍</a>
            </div>
        </div>
    </div>

    <!-- ПОПАП -->
    <div id="popup-overlay">
        <div id="popup-content">
            <button id="popup-close" onclick="closePopup()">✕</button>
            <h2><span>⛽</span> Подпишись!</h2>
            <p class="subtitle">Чтобы zawsze знать, <strong>где есть бензин</strong> в Туле.</p>
            <a href="https://t.me/Zapravoil" target="_blank" id="popup-button">
                Перейти в канал →
            </a>
            <div id="popup-timer">Закроется через <span id="countdown">10</span> сек</div>
        </div>
    </div>

    <!-- МОДАЛКА -->
    <div id="feedback-modal">
        <div id="feedback-content">
            <h3>💬 Сообщить</h3>
            <p class="sub">Нашли неточность? Напишите!</p>
            <textarea id="feedback-text" placeholder="Например: на АЗС №5 закончился 95-й..."></textarea>
            <div id="feedback-actions">
                <button id="feedback-cancel" onclick="closeFeedback()">Отмена</button>
                <button id="feedback-send" onclick="sendFeedback()">Отправить</button>
            </div>
        </div>
    </div>

    <script>
        // === КОНФИГУРАЦИЯ ===
        const MAP_URL = 'https://www.google.com/maps/d/u/0/embed?mid=189xI53EXgDdXl5Ffhype8F7HCA2IVFI&ehbc=2E312F';
        const STATIONS_DATA = { green: 12 };
        const RATING = { value: 4.8 };
        const VIEWS = 7518;

        // === ПРИВЕТСТВИЕ ===
        (function setGreeting() {
            const hour = new Date().getHours();
            let emoji = '';
            if (hour >= 5 && hour < 12) emoji = '☀️ Доброе утро!';
            else if (hour >= 12 && hour < 18) emoji = '🌤️ Добрый день!';
            else if (hour >= 18 && hour < 23) emoji = '🌆 Добрый вечер!';
            else emoji = '🌙 Доброй ночи!';
            document.getElementById('greeting').textContent = emoji;
        })();

        // === ДАТА ===
        (function setDate() {
            const now = new Date();
            document.getElementById('time-label').textContent = now.toLocaleDateString('ru-RU', {
                day: 'numeric',
                month: 'short'
            });
        })();

        // === ОБНОВЛЕНИЕ ДАННЫХ ===
        function updateData() {
            document.getElementById('green-count').textContent = STATIONS_DATA.green;
            document.getElementById('rating-value').textContent = RATING.value.toFixed(1);
            document.getElementById('views-count').textContent = VIEWS;
        }
        updateData();

        // === КАРТА ===
        let loadAttempts = 0;
        const MAX_ATTEMPTS = 3;
        const mapFrame = document.getElementById('map-frame');
        const loading = document.getElementById('loading');

        function loadMap() {
            loading.style.display = 'block';
            mapFrame.src = MAP_URL;
        }

        function refreshMap() {
            loadAttempts = 0;
            loading.style.display = 'block';
            mapFrame.src = '';
            setTimeout(() => {
                mapFrame.src = MAP_URL;
                updateData();
            }, 150);
        }

        mapFrame.addEventListener('load', function() {
            loading.style.display = 'none';
        });

        setTimeout(function checkLoaded() {
            if (loading.style.display !== 'none' && loadAttempts < MAX_ATTEMPTS) {
                loadAttempts++;
                mapFrame.src = MAP_URL;
                setTimeout(checkLoaded, 4000);
            }
        }, 5000);

        // === ПОПАП ===
        const popup = document.getElementById('popup-overlay');
        let countdownInterval;
        let countdownValue = 10;

        function closePopup() {
            popup.style.display = 'none';
            if (countdownInterval) clearInterval(countdownInterval);
        }

        function startCountdown() {
            const timerElement = document.getElementById('countdown');
            countdownValue = 10;
            timerElement.textContent = countdownValue;
            countdownInterval = setInterval(() => {
                countdownValue--;
                timerElement.textContent = countdownValue;
                if (countdownValue <= 0) {
                    clearInterval(countdownInterval);
                    closePopup();
                }
            }, 1000);
        }

        // === ШАРИНГ ===
        function sharePage() {
            if (navigator.share) {
                navigator.share({
                    title: 'Заправки Тула',
                    text: 'Актуальная карта заправок в Туле',
                    url: window.location.href
                }).catch(() => {});
            } else {
                navigator.clipboard.writeText(window.location.href).then(() => {
                    alert('Ссылка скопирована!');
                }).catch(() => {});
            }
        }

        // === ФОРМА ===
        function openFeedback() {
            document.getElementById('feedback-modal').classList.add('show');
        }

        function closeFeedback() {
            document.getElementById('feedback-modal').classList.remove('show');
        }

        function sendFeedback() {
            const text = document.getElementById('feedback-text').value.trim();
            if (!text) {
                alert('Напишите сообщение!');
                return;
            }

            const BOT_TOKEN = 'ВАШ_ТОКЕН_БОТА';
            const CHAT_ID = 'ВАШ_TELEGRAM_ID';

            if (BOT_TOKEN === 'ВАШ_ТОКЕН_БОТА') {
                alert('✅ Сообщение: "' + text + '"\n\nНастройте бота, чтобы оно приходило вам в Telegram.');
                closeFeedback();
                document.getElementById('feedback-text').value = '';
                return;
            }

            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            const message = `📩 *Новое сообщение с карты*\n\n${text}`;

            fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CHAT_ID, text: message, parse_mode: 'Markdown' })
                })
                .then(() => {
                    alert('✅ Сообщение отправлено! Спасибо!');
                    closeFeedback();
                    document.getElementById('feedback-text').value = '';
                })
                .catch(() => {
                    alert('❌ Ошибка отправки. Попробуйте позже.');
                });
        }

        // === ЗАПУСК ===
        loadMap();
        startCountdown();

        if (sessionStorage.getItem('popupShown') === 'true') {
            popup.style.display = 'none';
            clearInterval(countdownInterval);
        } else {
            popup.style.display = 'flex';
        }
        sessionStorage.setItem('popupShown', 'true');
    </script>
</body>
</html>
